<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Yakın Arkadaş Testi 💛</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #FF6B9D;
    --purple: #C44DFF;
    --yellow: #FFD93D;
    --green: #6BCB77;
    --blue: #4D96FF;
    --orange: #FF9A3C;
    --bg: #0D0D1A;
    --card: #16162A;
    --card2: #1E1E35;
    --text: #FFFFFF;
    --text2: rgba(255,255,255,0.6);
    --border: rgba(255,255,255,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overflow-x: hidden;
  }

  /* Background blobs */
  body::before {
    content: '';
    position: fixed;
    top: -20%;
    right: -20%;
    width: 60vw;
    height: 60vw;
    background: radial-gradient(circle, rgba(196,77,255,0.15) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -20%;
    left: -20%;
    width: 60vw;
    height: 60vw;
    background: radial-gradient(circle, rgba(255,107,157,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .screen { display: none; position: relative; z-index: 1; min-height: 100vh; padding: 0 0 40px; }
  .screen.active { display: block; }

  /* ── SETUP SCREEN (Now Welcome Screen) ── */
  .welcome-center {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    text-align: center;
  }
  .setup-header {
    background: linear-gradient(135deg, #C44DFF22, #FF6B9D22);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px 20px;
    text-align: center;
    width: 100%;
    max-width: 400px;
  }
  .setup-header .emoji { font-size: 56px; display: block; margin-bottom: 16px; }
  .setup-header h1 { font-size: 28px; font-weight: 900; letter-spacing: -0.5px; }
  .setup-header h1 span { background: linear-gradient(90deg, var(--pink), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .setup-header p { font-size: 15px; color: var(--text2); margin-top: 12px; }

  .start-btn {
    margin-top: 30px;
    display: block;
    width: 100%;
    padding: 18px;
    border-radius: 16px;
    border: none;
    background: linear-gradient(135deg, var(--purple), var(--pink));
    color: white;
    font-family: 'Nunito', sans-serif;
    font-size: 18px;
    font-weight: 900;
    cursor: pointer;
    letter-spacing: 0.3px;
    box-shadow: 0 8px 30px rgba(196,77,255,0.35);
  }
  .start-btn:active { transform: scale(0.98); }

  /* ── QUIZ SCREEN ── */
  .quiz-top {
    padding: 56px 20px 0;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .quiz-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    font-size: 13px;
    color: var(--text2);
    font-weight: 700;
  }
  .q-counter { font-size: 13px; font-weight: 800; color: var(--text2); }

  .progress-track {
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--purple), var(--pink));
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  }

  .quiz-body { padding: 20px 16px; }

  .person-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px 6px 8px;
    border-radius: 99px;
    font-size: 13px;
    font-weight: 800;
    margin-bottom: 16px;
  }
  .person-badge .dot { width: 8px; height: 8px; border-radius: 50%; }

  .q-question {
    font-size: 20px;
    font-weight: 800;
    line-height: 1.4;
    margin-bottom: 24px;
    letter-spacing: -0.3px;
  }

  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice-btn {
    width: 100%;
    padding: 16px 18px;
    border-radius: 14px;
    border: 1.5px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 700;
    text-align: left;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.2s;
  }
  .choice-btn:active { transform: scale(0.98); }
  .choice-letter {
    width: 30px; height: 30px; border-radius: 8px;
    background: rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 900; flex-shrink: 0;
    transition: all 0.2s;
  }
  .choice-btn.selected .choice-letter { background: rgba(196,77,255,0.3); color: var(--purple); }
  .choice-btn.correct { border-color: var(--green); background: rgba(107,203,119,0.1); }
  .choice-btn.correct .choice-letter { background: rgba(107,203,119,0.3); color: var(--green); }
  .choice-btn.wrong { border-color: var(--pink); background: rgba(255,107,157,0.1); }
  .choice-btn.wrong .choice-letter { background: rgba(255,107,157,0.3); color: var(--pink); }

  .feedback-bar {
    margin: 16px 0;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    display: none;
  }
  .feedback-bar.correct { background: rgba(107,203,119,0.15); color: var(--green); border: 1px solid rgba(107,203,119,0.3); }
  .feedback-bar.wrong { background: rgba(255,107,157,0.15); color: var(--pink); border: 1px solid rgba(255,107,157,0.3); }

  .next-btn {
    display: none;
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, var(--purple), var(--pink));
    color: white;
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    margin-top: 8px;
    box-shadow: 0 6px 20px rgba(196,77,255,0.3);
  }
  .next-btn:active { transform: scale(0.98); }

  /* ── RESULT SCREEN ── */
  .result-bg {
    padding: 56px 20px 20px;
    text-align: center;
    position: relative;
  }
  .trophy { font-size: 64px; display: block; margin-bottom: 12px; animation: bounce 0.6s ease; }
  @keyframes bounce {
    0% { transform: scale(0) rotate(-10deg); }
    70% { transform: scale(1.15) rotate(3deg); }
    100% { transform: scale(1) rotate(0deg); }
  }
  .result-title { font-size: 26px; font-weight: 900; margin-bottom: 6px; }
  .result-subtitle { font-size: 14px; color: var(--text2); }

  .big-score {
    margin: 24px auto;
    width: 140px; height: 140px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--purple), var(--pink));
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    box-shadow: 0 12px 40px rgba(196,77,255,0.4);
  }
  .big-score .num { font-size: 44px; font-weight: 900; line-height: 1; }
  .big-score .denom { font-size: 14px; font-weight: 700; opacity: 0.8; }

  .result-msg { font-size: 16px; font-weight: 700; color: var(--text2); margin-bottom: 24px; }

  .breakdown { margin: 0 16px; }
  .breakdown h3 { font-size: 13px; font-weight: 800; color: var(--text2); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; text-align: left; }
  .person-row {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .person-row .pname { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .person-row .mini-dot { width: 10px; height: 10px; border-radius: 50%; }
  .person-row .pscore { font-size: 15px; font-weight: 800; }

  .score-bar-wrap { flex: 1; margin: 0 12px; height: 4px; background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden; }
  .score-bar-fill { height: 100%; border-radius: 99px; }

  .replay-btn {
    display: block;
    margin: 20px 16px 0;
    width: calc(100% - 32px);
    padding: 16px;
    border-radius: 14px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
  }
  .replay-btn:active { transform: scale(0.98); }
</style>
</head>
<body>

<div id="screen-welcome" class="screen active">
  <div class="welcome-center">
    <div class="setup-header">
      <span class="emoji">💛</span>
      <h1>Yakın <span>Arkadaş Testi</span></h1>
      <p>5 kişi × 5 soru — kim ne kadar tanıyor?</p>
      <button class="start-btn" onclick="startQuiz()">Testi Başlat →</button>
    </div>
  </div>
</div>

<div id="screen-quiz" class="screen">
  <div class="quiz-top">
    <div class="quiz-meta">
      <span id="q-counter">Soru 1 / 25</span>
      <span id="q-score-live">0 doğru</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>
  <div class="quiz-body">
    <div class="person-badge" id="q-badge"></div>
    <div class="q-question" id="q-text"></div>
    <div class="choices" id="q-choices"></div>
    <div class="feedback-bar" id="feedback-bar"></div>
    <button class="next-btn" id="next-btn" onclick="nextQ()">Sonraki →</button>
  </div>
</div>

<div id="screen-result" class="screen">
  <div class="result-bg">
    <span class="trophy" id="trophy">🏆</span>
    <div class="result-title" id="result-title">Süpersin!</div>
    <div class="result-subtitle" id="result-subtitle">Test bitti!</div>
    <div class="big-score">
      <div class="num" id="score-num">0</div>
      <div class="denom" id="score-denom">/ 25</div>
    </div>
    <div class="result-msg" id="result-msg"></div>
  </div>
  <div class="breakdown">
    <h3>Kişi başı sonuç</h3>
    <div id="breakdown-list"></div>
  </div>
  <button class="replay-btn" onclick="goSetup()">↺ Tekrar Oyna</button>
</div>

<script>
const PEOPLE = [
  { name: "Asuman",  color: "#FF6B9D", bg: "rgba(255,107,157,0.15)" },
  { name: "Ceren",   color: "#C44DFF", bg: "rgba(196,77,255,0.15)" },
  { name: "Sezen",   color: "#4D96FF", bg: "rgba(77,150,255,0.15)" },
  { name: "Simay",   color: "#FFD93D", bg: "rgba(255,217,61,0.15)" },
  { name: "Tuana",   color: "#6BCB77", bg: "rgba(107,203,119,0.15)" }
];
const Q_COUNT = 5;
const LABELS = ["A","B","C","D"];

// ⬇️ SORULARI BURADAN DÜZENLEYEBİLİRSİNİZ ⬇️
// correct: 0 (A), 1 (B), 2 (C), 3 (D) demektir.
const quizData = [
  // --- ASUMAN'IN SORULARI ---
  { person: PEOPLE[0], question: "Asuman'ın en sevdiği renk hangisi?", options: ["Kırmızı", "Mavi", "Pembe", "Siyah"], correct: 2 },
  { person: PEOPLE[0], question: "Asuman sabah uyanınca ilk ne yapar?", options: ["Telefona bakar", "Su içer", "Yüzünü yıkar", "Geri uyur"], correct: 0 },
  { person: PEOPLE[0], question: "Asuman hangi yemeğe asla hayır diyemez?", options: ["Mantı", "Pizza", "Hamburger", "Makarna"], correct: 0 },
  { person: PEOPLE[0], question: "Asuman'ın en büyük korkusu nedir?", options: ["Karanlık", "Yükseklik", "Böcekler", "Kalabalık"], correct: 2 },
  { person: PEOPLE[0], question: "Asuman'ın favori tatil planı nasıldır?", options: ["Deniz kum güneş", "Orman kampı", "Kültür turu", "Evde yatmak"], correct: 0 },

  // --- CEREN'İN SORULARI ---
  { person: PEOPLE[1], question: "Ceren günde kaç kupa kahve içer?", options: ["Hiç içmez", "1-2", "3-4", "Sayısını kendi de bilmiyor"], correct: 3 },
  { person: PEOPLE[1], question: "Ceren'in en sevdiği dizi türü nedir?", options: ["Komedi", "Korku", "Bilim Kurgu", "Drama"], correct: 0 },
  { person: PEOPLE[1], question: "Ceren sinirlenince ne yapar?", options: ["Bağırır", "Susar", "Uyumaya gider", "Güler"], correct: 1 },
  { person: PEOPLE[1], question: "Ceren tatlılardan en çok hangisini sever?", options: ["Sütlaç", "Çikolata", "Baklava", "Cheesecake"], correct: 3 },
  { person: PEOPLE[1], question: "Ceren'in uğurlu sayısı kaçtır?", options: ["3", "5", "7", "9"], correct: 2 },

  // --- SEZEN'İN SORULARI ---
  { person: PEOPLE[2], question: "Sezen boş zamanlarında en çok ne yapar?", options: ["Kitap okur", "Oyun oynar", "Film izler", "Müzik dinler"], correct: 3 },
  { person: PEOPLE[2], question: "Sezen'in en tahammül edemediği şey nedir?", options: ["Yalan", "Gürültü", "Dağınıklık", "Bekletilmek"], correct: 3 },
  { person: PEOPLE[2], question: "Sezen'in favori mevsimi hangisidir?", options: ["İlkbahar", "Yaz", "Sonbahar", "Kış"], correct: 2 },
  { person: PEOPLE[2], question: "Sezen bir hayvan olsa hangisi olurdu?", options: ["Kedi", "Köpek", "Kuş", "Panda"], correct: 0 },
  { person: PEOPLE[2], question: "Sezen'in dolabında en çok hangi renk kıyafet var?", options: ["Siyah", "Beyaz", "Gri", "Mavi"], correct: 0 },

  // --- SİMAY'IN SORULARI ---
  { person: PEOPLE[3], question: "Simay hangi sporu yapmayı/izlemeyi sever?", options: ["Futbol", "Basketbol", "Voleybol", "Tenis"], correct: 2 },
  { person: PEOPLE[3], question: "Simay'ın çocukluk hayalindeki meslek neydi?", options: ["Öğretmen", "Doktor", "Astronot", "Oyuncu"], correct: 1 },
  { person: PEOPLE[3], question: "Simay bir gücün olsa hangisini seçerdi?", options: ["Uçmak", "Görünmezlik", "Zihin Okumak", "Işınlanmak"], correct: 3 },
  { person: PEOPLE[3], question: "Simay'ın en sevdiği abur cubur nedir?", options: ["Cips", "Çikolata", "Jelibon", "Bisküvi"], correct: 0 },
  { person: PEOPLE[3], question: "Simay en çok hangi kelimeyi kullanır?", options: ["Aynen", "Yani", "Of", "Falan"], correct: 0 },

  // --- TUANA'NIN SORULARI ---
  { person: PEOPLE[4], question: "Tuana haftasonu genelde saat kaçta uyanır?", options: ["08:00", "10:00", "12:00", "14:00+"], correct: 2 },
  { person: PEOPLE[4], question: "Tuana'nın telefonu genelde hangi moddadır?", options: ["Sesli", "Titreşim", "Sessiz", "Rahatsız Etmeyin"], correct: 2 },
  { person: PEOPLE[4], question: "Tuana bir adaya düşse yanına alacağı 3 şeyden biri kesinlikle nedir?", options: ["Telefon", "Kitap", "Güneş kremi", "Bıçak"], correct: 0 },
  { person: PEOPLE[4], question: "Tuana'nın müzik zevki nasıldır?", options: ["Pop", "Rock", "Rap", "Karışık (Ruh haline göre)"], correct: 3 },
  { person: PEOPLE[4], question: "Tuana yemek yapmayı sever mi?", options: ["Bayılır", "Mecbur kalınca yapar", "Sadece makarna yapar", "Mutfaktan nefret eder"], correct: 1 }
];
// ⬆️ SORULARI BURADAN DÜZENLEYEBİLİRSİNİZ ⬆️

let currentQ = 0;
let correctCount = 0;
let personCorrect = {};
let answered = false;

/* ── START QUIZ ── */
function startQuiz() {
  currentQ = 0;
  correctCount = 0;
  personCorrect = {};
  PEOPLE.forEach(p => personCorrect[p.name] = 0);
  answered = false;

  document.getElementById("screen-welcome").classList.remove("active");
  document.getElementById("screen-quiz").classList.add("active");
  renderQ();
}

/* ── RENDER QUESTION ── */
function renderQ() {
  answered = false;
  const q = quizData[currentQ];
  const total = quizData.length;

  document.getElementById("progress-fill").style.width = (currentQ / total * 100) + "%";
  document.getElementById("q-counter").textContent = `Soru ${currentQ + 1} / ${total}`;
  document.getElementById("q-score-live").textContent = correctCount + " doğru";

  const badge = document.getElementById("q-badge");
  badge.style.background = q.person.bg;
  badge.style.color = q.person.color;
  badge.innerHTML = `<div class="dot" style="background:${q.person.color}"></div>${q.person.name} hakkında`;

  document.getElementById("q-text").textContent = q.question;

  const fb = document.getElementById("feedback-bar");
  fb.style.display = "none";
  fb.className = "feedback-bar";

  document.getElementById("next-btn").style.display = "none";

  const choicesEl = document.getElementById("q-choices");
  choicesEl.innerHTML = "";
  q.options.forEach((opt, oi) => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.id = "choice-" + oi;
    btn.innerHTML = `<div class="choice-letter">${LABELS[oi]}</div><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(oi);
    choicesEl.appendChild(btn);
  });
}

function selectAnswer(oi) {
  if (answered) return;
  answered = true;
  const q = quizData[currentQ];

  for (let x = 0; x < 4; x++) {
    const btn = document.getElementById("choice-" + x);
    btn.onclick = null;
    if (x === q.correct) btn.classList.add("correct");
    else if (x === oi) btn.classList.add("wrong");
  }

  const fb = document.getElementById("feedback-bar");
  if (oi === q.correct) {
    correctCount++;
    personCorrect[q.person.name]++;
    fb.className = "feedback-bar correct";
    fb.textContent = "✓ Doğru! Harika!";
  } else {
    fb.className = "feedback-bar wrong";
    fb.textContent = "✗ Yanlış! Doğru cevap: " + LABELS[q.correct];
  }
  fb.style.display = "block";

  const nb = document.getElementById("next-btn");
  nb.style.display = "block";
  nb.textContent = currentQ < quizData.length - 1 ? "Sonraki →" : "Sonuçları Gör 🎉";
}

function nextQ() {
  currentQ++;
  if (currentQ >= quizData.length) showResult();
  else renderQ();
}

/* ── RESULT ── */
function showResult() {
  document.getElementById("screen-quiz").classList.remove("active");
  document.getElementById("screen-result").classList.add("active");

  const total = quizData.length;
  const pct = correctCount / total;

  let trophy = "🏆", title = "Muhteşemsin!", msg = "";
  if (pct === 1)       { trophy = "👑"; title = "Mükemmel!"; msg = "25/25 — sen varya sen adamsın be!"; }
  else if (pct >= 0.8) { trophy = "🏆"; title = "Süpersin!"; msg = "Helal lan sana yusufi!"; }
  else if (pct >= 0.6) { trophy = "🌟"; title = "Fena değil!"; msg = "cok iyi değil ama hadi yine iyisin!"; }
  else if (pct >= 0.4) { trophy = "🙈"; title = "Hmm..."; msg = "yuh arkadaşlarını biraz daha yakından tanımalısın!"; }
  else                 { trophy = "😅"; title = "Tanışalım mı?"; msg = "Bunlar senin arkadaşların mı emin misin? 😂"; }

  document.getElementById("trophy").textContent = trophy;
  document.getElementById("result-title").textContent = title;
  document.getElementById("result-subtitle").textContent = "Test bitti!";
  document.getElementById("score-num").textContent = correctCount;
  document.getElementById("score-denom").textContent = "/ " + total;
  document.getElementById("result-msg").textContent = msg;

  const list = document.getElementById("breakdown-list");
  list.innerHTML = "";
  PEOPLE.forEach(p => {
    const c = personCorrect[p.name];
    const row = document.createElement("div");
    row.className = "person-row";
    row.innerHTML = `
      <div class="pname"><div class="mini-dot" style="background:${p.color}"></div>${p.name}</div>
      <div class="score-bar-wrap">
        <div class="score-bar-fill" style="width:${c/Q_COUNT*100}%;background:${p.color}"></div>
      </div>
      <div class="pscore" style="color:${p.color}">${c}/${Q_COUNT}</div>`;
    list.appendChild(row);
  });
}

function goSetup() {
  document.getElementById("screen-result").classList.remove("active");
  document.getElementById("screen-welcome").classList.add("active");
  window.scrollTo(0,0);
}
</script>
</body>
</html>
